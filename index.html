function icon(name, cls = "ic") {
  const p = ICON_PATHS[name];
  if (!p) return "";
  return '<svg class="' + cls + '" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">' + p + '</svg>';
}
// แมปไอคอนของแต่ละแบบฟอร์ม
const FORM_ICONS = {
  dltv01: "clipboardList", dltv02: "clipboardCheck", dltv03: "book",
  dltv05: "monitor", dltv06: "userCheck", dltv07: "smile"
};

// สร้างฟิลด์หนึ่งช่อง ลงทะเบียน getter (registry) และ setter (setters)
function renderField(field, schema, registry, setters) {
  const wrap = el("div", { class: "field field--" + field.type });

  if (field.type === "heading") {
    return el("h4", { class: "field-heading", html: icon("list", "fh-ic") + "<span>" + esc(field.label) + "</span>" });
  }
  if (field.type === "note") {
    return el("div", { class: "field-note" }, [
      el("span", { class: "field-label", text: field.label }),
      el("p", { class: "note-text", text: field.text || "" })
    ]);
  }

  const labelText = field.label + (field.required ? " *" : "");
  const label = el("label", { class: "field-label", for: "f_" + field.id, text: labelText });

  let input;
  switch (field.type) {
    case "text":
    case "number": {
      input = el("input", {
        type: field.type === "number" ? "number" : "text",
        id: "f_" + field.id, class: "input"
      });
      if (field.maxlength) input.setAttribute("maxlength", field.maxlength);
      registry[field.id] = () => input.value.trim();
      setters[field.id] = v => { input.value = v ?? ""; };
      wrap.append(label, input);
      break;
    }
    case "textarea": {
      input = el("textarea", { id: "f_" + field.id, class: "input textarea", rows: "3" });
      registry[field.id] = () => input.value.trim();
      setters[field.id] = v => { input.value = v ?? ""; };
      wrap.append(label, input);
      break;
    }
    case "inline": {
      wrap.append(label);
      const rowEl = el("div", { class: "inline-row" });
      const getters = {}; const partInputs = {};
      (field.parts || []).forEach(p => {
        if (p.prefix) rowEl.append(el("span", { class: "inline-affix", text: p.prefix }));
        const inp = el("input", { type: p.type === "number" ? "number" : "text", id: "f_" + field.id + "_" + p.id, class: "input input--inline" });
        getters[p.id] = () => inp.value.trim();
        partInputs[p.id] = inp;
        rowEl.append(inp);
        if (p.suffix) rowEl.append(el("span", { class: "inline-affix", text: p.suffix }));
      });
      registry[field.id] = () => {
        const o = {}; for (const [k, g] of Object.entries(getters)) o[k] = g(); return o;
      };
      setters[field.id] = v => {
        if (!v || typeof v !== "object") return;
        for (const [k, inp] of Object.entries(partInputs)) if (k in v) inp.value = v[k] ?? "";
      };
      wrap.append(rowEl);
      break;
    }
    case "select": {
      input = el("select", { id: "f_" + field.id, class: "input select" });
      input.append(el("option", { value: "", text: "— เลือก —" }));
      (field.options || []).forEach(o => input.append(el("option", { value: o, text: o })));
      registry[field.id] = () => input.value;
      setters[field.id] = v => { input.value = v ?? ""; };
      wrap.append(label, input);
      break;
    }
    case "radio": {
      const group = el("div", { class: "options" });
      (field.options || []).forEach((o, i) => {
        const id = "f_" + field.id + "_" + i;
        const r = el("input", { type: "radio", name: "f_" + field.id, id, value: o });
        group.append(el("label", { class: "opt", for: id }, [r, el("span", { text: o })]));
      });
      registry[field.id] = () => {
        const sel = group.querySelector("input:checked");
        return sel ? sel.value : "";
      };
      setters[field.id] = v => {
        group.querySelectorAll("input").forEach(inp => { inp.checked = (inp.value === v); });
      };
      wrap.append(label, group);
      break;
    }
    case "checkbox": {
      const group = el("div", { class: "options" });
      (field.options || []).forEach((o, i) => {
        const id = "f_" + field.id + "_" + i;
        const c = el("input", { type: "checkbox", name: "f_" + field.id, id, value: o });
        group.append(el("label", { class: "opt", for: id }, [c, el("span", { text: o })]));
      });
      registry[field.id] = () =>
        Array.from(group.querySelectorAll("input:checked")).map(c => c.value);
      setters[field.id] = v => {
        const arr = Array.isArray(v) ? v : (v ? [v] : []);
        group.querySelectorAll("input").forEach(inp => { inp.checked = arr.includes(inp.value); });
      };
      wrap.append(label, group);
      break;
    }
    case "rating": {
      const row = el("div", { class: "rating-row" });
      row.append(el("div", { class: "rating-label", text: field.label }));
      const scale = schema.ratingScale || [{ value: 3 }, { value: 2 }, { value: 1 }];

      let getEvidence = () => [];
      let setEvidence = () => {};
      if (Array.isArray(field.evidence) && field.evidence.length) {
        const ev = el("div", { class: "evidence" });
        ev.append(el("div", { class: "evidence__title", text: "ร่องรอย / หลักฐาน" }));
        const evList = el("div", { class: "evidence__list" });
        const boxes = [];
        field.evidence.forEach((txt, i) => {
          const id = "f_" + field.id + "_ev" + i;
          const cb = el("input", { type: "checkbox", id, value: txt });
          boxes.push(cb);
          evList.append(el("label", { class: "evidence__item", for: id }, [cb, el("span", { text: txt })]));
        });
        ev.append(evList);
        row.append(ev);
        getEvidence = () => boxes.filter(b => b.checked).map(b => b.value);
        setEvidence = arr => { const a = arr || []; boxes.forEach(b => { b.checked = a.includes(b.value); }); };
      }

      const radios = [];
      if (field.levels) {
        const rubric = el("div", { class: "rubric" });
        rubric.append(el("div", { class: "rubric__title", text: "เกณฑ์การประเมิน" }));
        scale.forEach(s => {
          const id = "f_" + field.id + "_" + s.value;
          const r = el("input", { type: "radio", name: "f_" + field.id, id, value: s.value });
          radios.push(r);
          rubric.append(el("label", { class: "rubric__opt", for: id }, [
            r,
            el("span", { class: "rubric__badge", text: String(s.value) }),
            el("span", { class: "rubric__text", text: field.levels[String(s.value)] || "" })
          ]));
        });
        row.append(rubric);
      } else {
        const choices = el("div", { class: "rating-choices" });
        scale.forEach(s => {
          const id = "f_" + field.id + "_" + s.value;
          const r = el("input", { type: "radio", name: "f_" + field.id, id, value: s.value });
          radios.push(r);
          choices.append(el("label", { class: "rating-opt", for: id }, [r, el("span", { text: s.label || s.value })]));
        });
        row.append(choices);
      }

      let getSuggestion = () => "";
      let setSuggestion = () => {};
      if (schema.itemSuggestion) {
        const sug = el("input", { type: "text", class: "input input--sm", placeholder: "ข้อเสนอแนะ" });
        getSuggestion = () => sug.value.trim();
        setSuggestion = v => { sug.value = v ?? ""; };
        row.append(sug);
      }
      registry[field.id] = () => {
        const sel = radios.find(r => r.checked);
        return { score: sel ? Number(sel.value) : null, suggestion: getSuggestion(), evidence: getEvidence() };
      };
      setters[field.id] = v => {
        if (!v || typeof v !== "object") return;
        radios.forEach(r => { r.checked = (Number(r.value) === Number(v.score)); });
        setSuggestion(v.suggestion);
        setEvidence(v.evidence);
      };
      registry["__rating__" + field.id] = true;
      return row;
    }
    case "table": {
      const tableWrap = el("div", { class: "table-wrap" });
      tableWrap.append(label);
      const table = el("table", { class: "data-table" });
      const thead = el("thead");
      const headRow = el("tr");
      headRow.append(el("th", { text: "" }));
      (field.columns || []).forEach(c => headRow.append(el("th", { text: c.label })));
      thead.append(headRow);
      const tbody = el("tbody");
      const cellGetters = {}; const cellInputs = {};
      (field.rows || []).forEach(rowName => {
        const tr = el("tr");
        tr.append(el("th", { class: "row-head", text: rowName }));
        cellGetters[rowName] = {}; cellInputs[rowName] = {};
        (field.columns || []).forEach(c => {
          const inp = el("input", { type: c.type === "number" ? "number" : "text", class: "input input--cell" });
          cellGetters[rowName][c.id] = () => inp.value.trim();
          cellInputs[rowName][c.id] = inp;
          tr.append(el("td", {}, [inp]));
        });
        tbody.append(tr);
      });
      table.append(thead, tbody);
      tableWrap.append(table);
      registry[field.id] = () => {
        const out = {};
        for (const [rn, cols] of Object.entries(cellGetters)) {
          out[rn] = {};
          for (const [cid, getter] of Object.entries(cols)) out[rn][cid] = getter();
        }
        return out;
      };
      setters[field.id] = v => {
        if (!v || typeof v !== "object") return;
        for (const [rn, cols] of Object.entries(cellInputs)) {
          if (!v[rn]) continue;
          for (const [cid, inp] of Object.entries(cols)) if (cid in v[rn]) inp.value = v[rn][cid] ?? "";
        }
      };
      return tableWrap;
    }
    default:
      wrap.append(label, el("em", { text: "(ชนิดฟิลด์ไม่รองรับ: " + field.type + ")" }));
  }
  return wrap;
}

// ตารางประเมินแบบฟอร์มต้นฉบับ สำหรับ section ที่ให้คะแนน
function buildEvalTable(sec, schema, registry, setters, fieldIds) {
  const scale = schema.ratingScale || [{ value: 3 }, { value: 2 }, { value: 1 }];
  const isRubric = (sec.fields || []).some(f => f.type === "rating" && f.levels);
  const table = el("table", { class: "eval-table " + (isRubric ? "eval-table--rubric" : "eval-table--rating") });
  const thead = el("thead");
  const hr = el("tr");
  if (isRubric) {
    ["รายการประเมินและตัวชี้วัด", "ร่องรอย / หลักฐาน", "ระดับ", "เกณฑ์การประเมิน"].forEach(h => hr.append(el("th", { text: h })));
  } else {
    hr.append(el("th", { text: "รายการประเมิน" }));
    scale.forEach(s => hr.append(el("th", { class: "th-num", text: String(s.value) })));
    if (schema.itemSuggestion) hr.append(el("th", { text: "ข้อเสนอแนะ" }));
  }
  thead.append(hr);
  const tbody = el("tbody");
  const colCount = isRubric ? 4 : (1 + scale.length + (schema.itemSuggestion ? 1 : 0));

  (sec.fields || []).forEach(f => {
    if (f.type === "heading") {
      const tr = el("tr", { class: "eval-section-row" });
      tr.append(el("td", { colspan: colCount, text: f.label }));
      tbody.append(tr);
      return;
    }
    if (f.type !== "rating") return;
    fieldIds.push(f.id);
    registry["__rating__" + f.id] = true;
    const radios = [];
    let evBoxes = [];
    let sugEl = null;

    if (isRubric) {
      const evCell = el("td", { class: "ev-cell" });
      if (Array.isArray(f.evidence) && f.evidence.length) {
        f.evidence.forEach((txt, i) => {
          const id = "f_" + f.id + "_ev" + i;
          const cb = el("input", { type: "checkbox", id, value: txt });
          evBoxes.push(cb);
          evCell.append(el("label", { class: "ev-item", for: id }, [cb, el("span", { text: txt })]));
        });
      }
      scale.forEach((s, idx) => {
        const tr = el("tr", { class: "rubric-tr" });
        if (idx === 0) {
          tr.append(el("td", { class: "ind-cell", rowspan: scale.length }, [el("span", { text: f.label })]));
          evCell.setAttribute("rowspan", scale.length);
          tr.append(evCell);
        }
        const id = "f_" + f.id + "_" + s.value;
        const r = el("input", { type: "radio", name: "f_" + f.id, id, value: s.value });
        radios.push(r);
        tr.append(el("td", { class: "lvl-cell" }, [el("label", { class: "lvl-pick", for: id }, [r, el("span", { class: "lvl-badge", text: String(s.value) })])]));
        tr.append(el("td", { class: "crit-cell" }, [el("label", { for: id, text: f.levels[String(s.value)] || "" })]));
        tbody.append(tr);
      });
      registry[f.id] = () => {
        const sel = radios.find(r => r.checked);
        return { score: sel ? Number(sel.value) : null, evidence: evBoxes.filter(b => b.checked).map(b => b.value) };
      };
      setters[f.id] = v => {
        if (!v || typeof v !== "object") return;
        radios.forEach(r => { r.checked = (Number(r.value) === Number(v.score)); });
        const a = v.evidence || []; evBoxes.forEach(b => { b.checked = a.includes(b.value); });
      };
    } else {
      const tr = el("tr");
      tr.append(el("td", { class: "ind-cell", text: f.label }));
      scale.forEach(s => {
        const id = "f_" + f.id + "_" + s.value;
        const r = el("input", { type: "radio", name: "f_" + f.id, id, value: s.value });
        radios.push(r);
        tr.append(el("td", { class: "pick-cell" }, [el("label", { class: "pick", for: id }, [r])]));
      });
      if (schema.itemSuggestion) {
        sugEl = el("input", { type: "text", class: "input input--cell", placeholder: "—" });
        tr.append(el("td", { class: "sug-cell" }, [sugEl]));
      }
      tbody.append(tr);
      registry[f.id] = () => ({
        score: (radios.find(r => r.checked) || {}).value ? Number(radios.find(r => r.checked).value) : null,
        suggestion: sugEl ? sugEl.value.trim() : ""
      });
      setters[f.id] = v => {
        if (!v || typeof v !== "object") return;
        radios.forEach(r => { r.checked = (Number(r.value) === Number(v.score)); });
        if (sugEl) sugEl.value = v.suggestion ?? "";
      };
    }
  });
  table.append(thead, tbody);
  return el("div", { class: "table-wrap table-wrap--eval" }, [table]);
}

// ตารางความพร้อม (ไม่คิดคะแนน)
function buildLevelTable(sec, schema, registry, setters, fieldIds) {
  const table = el("table", { class: "eval-table eval-table--level" });
  const thead = el("thead");
  const hr = el("tr");
  ["รายการ", "แนวการพิจารณา", "ระดับความพร้อม"].forEach(h => hr.append(el("th", { text: h })));
  thead.append(hr);
  const tbody = el("tbody");

  (sec.fields || []).forEach(f => {
    if (f.type === "heading") {
      const tr = el("tr", { class: "eval-section-row" });
      tr.append(el("td", { colspan: 3, text: f.label }));
      tbody.append(tr);
      return;
    }
    if (f.type !== "level") return;
    fieldIds.push(f.id);
    const radios = [];
    const opts = f.options || [];
    opts.forEach((o, idx) => {
      const tr = el("tr", { class: "level-tr" });
      if (idx === 0) {
        const cell = el("td", { class: "ind-cell", rowspan: opts.length });
        cell.append(el("span", { text: f.label }));
        if (f.hint) cell.append(el("div", { class: "ind-hint", text: f.hint }));
        tr.append(cell);
      }
      const id = "f_" + f.id + "_" + idx;
      const r = el("input", { type: "radio", name: "f_" + f.id, id, value: o.value });
      radios.push(r);
      tr.append(el("td", { class: "consider-cell" }, [el("label", { for: id, text: o.desc })]));
      tr.append(el("td", { class: "ready-cell" }, [
        el("label", { class: "ready-pick", for: id }, [r, el("span", { text: o.value })])
      ]));
      tbody.append(tr);
    });
    registry[f.id] = () => { const sel = radios.find(r => r.checked); return sel ? sel.value : ""; };
    setters[f.id] = v => { radios.forEach(r => { r.checked = (r.value === v); }); };
  });
  table.append(thead, tbody);
  return el("div", { class: "table-wrap table-wrap--eval" }, [table]);
}

// สร้างทั้งฟอร์ม
function renderForm(schema, container) {
  container.innerHTML = "";
  const registry = {};  // field.id -> getter
  const setters = {};   // field.id -> setter
  const sectionScored = [];

  const sections = schema.sections || [{ id: "main", title: "", fields: schema.fields }];
  sections.forEach(sec => {
    const card = el("section", { class: "form-card" });
    if (sec.title) card.append(el("h3", { class: "section-title", html: icon("list", "sec-ic") + "<span>" + esc(sec.title) + "</span>" }));
    if (sec.scored) {
      card.classList.add("form-card--scored");
      if (schema.ratingLegend) card.append(el("p", { class: "rating-legend", text: schema.ratingLegend }));
      const meter = el("div", { class: "score-meter", id: "score_" + sec.id });
      meter.innerHTML =
        '<div class="score-meter__head">' +
          '<span class="score-meter__label">คะแนน</span>' +
          '<span class="score-meter__val"><b>0</b> / ' + sec.maxScore + '</span>' +
          '<span class="score-meter__level"></span>' +
        '</div>' +
        '<div class="score-meter__track"><div class="score-meter__fill" style="width:0%"></div></div>';
      card.append(meter);
    }

    const fieldIds = [];
    if (sec.scored) {
      card.append(buildEvalTable(sec, schema, registry, setters, fieldIds));
    } else if (sec.layout === "readiness") {
      card.append(buildLevelTable(sec, schema, registry, setters, fieldIds));
    } else {
      (sec.fields || []).forEach(f => {
        card.append(renderField(f, schema, registry, setters));
        if (f.id) fieldIds.push(f.id);
      });
    }

    if (sec.scored) {
      sectionScored.push({ id: sec.id, maxScore: sec.maxScore, qualityBands: sec.qualityBands, fieldIds, title: sec.title });
    }
    container.append(card);
  });

  container.addEventListener("change", () => updateScores());

  function updateScores() {
    sectionScored.forEach(sec => {
      let sum = 0;
      sec.fieldIds.forEach(fid => {
        if (registry["__rating__" + fid] && registry[fid]) {
          const v = registry[fid]();
          if (v && v.score) sum += v.score;
        }
      });
      const meter = container.querySelector("#score_" + sec.id);
      if (!meter) return;
      const pct = sec.maxScore ? Math.round((sum / sec.maxScore) * 100) : 0;
      meter.querySelector(".score-meter__val b").textContent = sum;
      meter.querySelector(".score-meter__fill").style.width = pct + "%";
      const levelEl = meter.querySelector(".score-meter__level");
      if (sec.qualityBands) {
        const b = sec.qualityBands.find(q => sum >= q.min && sum <= q.max);
        if (b) { levelEl.textContent = b.label; meter.dataset.level = b.level; }
        else { levelEl.textContent = ""; delete meter.dataset.level; }
      } else {
        meter.dataset.level = pct >= 80 ? 3 : pct >= 60 ? 2 : 1;
      }
    });
  }

  return {
    registry,
    setters,
    sectionScored,
    // เติมค่ากลับเข้าฟอร์ม (สำหรับแก้ไขข้อมูลเดิม)
    setValues(data) {
      if (!data) return;
      for (const [id, val] of Object.entries(data)) {
        if (setters[id]) { try { setters[id](val); } catch (e) { /* ข้าม field ที่ไม่ตรง */ } }
      }
      updateScores();
    },
    collect() {
      const data = {};
      for (const [id, getter] of Object.entries(registry)) {
        if (id.startsWith("__rating__")) continue;
        data[id] = getter();
      }
      const scores = {};
      let total = 0, totalMax = 0;
      sectionScored.forEach(sec => {
        let sum = 0;
        sec.fieldIds.forEach(fid => {
          const v = data[fid];
          if (v && typeof v === "object" && "score" in v && v.score) sum += v.score;
        });
        let band = null;
        if (sec.qualityBands) {
          const b = sec.qualityBands.find(q => sum >= q.min && sum <= q.max);
          band = b ? b.label : null;
        }
        scores[sec.id] = { title: sec.title, score: sum, max: sec.maxScore, level: band };
        total += sum; totalMax += sec.maxScore;
      });
      if (sectionScored.length) scores.__total = { score: total, max: totalMax };
      return { data, scores };
    },
    updateScores
  };
}

// firebase-service.js
// จัดการการบันทึก/แก้ไข/ลบ/ดึงข้อมูลจาก Firebase Firestore
// โหมดออฟไลน์: เก็บใน localStorage (อยู่ถาวรแม้ปิด/รีเฟรชหน้า) + ดาวน์โหลด/นำเข้า JSON
// ============================================================

let db = null;
let fsApi = null;                       // ฟังก์ชัน firestore ที่ import มา
const LS_KEY = "dltv_offline_submissions";
let offlineStore = loadLocal();         // อาเรย์ของ record ที่เก็บในเครื่อง

function loadLocal() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    return raw ? JSON.parse(raw) : [];
  } catch (e) {
    console.warn("[DLTV] อ่าน localStorage ไม่ได้:", e);
    return [];
  }
}
function saveLocal() {
  try {
    localStorage.setItem(LS_KEY, JSON.stringify(offlineStore));
  } catch (e) {
    console.warn("[DLTV] บันทึก localStorage ไม่ได้:", e);
  }
}

// เริ่มต้น Firebase (เรียกครั้งเดียวตอนแอปโหลด)
// แหล่งโหลด Firebase SDK (ESM) — ลองทีละแหล่งจนกว่าจะสำเร็จ
const FB_SOURCES = [
  {
    name: "gstatic",
    app: "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js",
    fs:  "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"
  },
  {
    name: "esm.sh",
    app: "https://esm.sh/firebase@10.12.0/app",
    fs:  "https://esm.sh/firebase@10.12.0/firestore"
  }
];
let lastFbError = null;

async function loadFirebaseSDK() {
  for (const src of FB_SOURCES) {
    try {
      const appMod = await import(src.app);
      const fsMod  = await import(src.fs);
      console.info("[DLTV] โหลด Firebase SDK จาก " + src.name + " สำเร็จ");
      return { appMod, fsMod, source: src.name };
    } catch (err) {
      lastFbError = err;
      console.warn("[DLTV] โหลด Firebase SDK จาก " + src.name + " ไม่สำเร็จ:", err);
    }
  }
  return null;
}

async function initFirebase(retries = 2) {
  if (OFFLINE_MODE) {
    console.info("[DLTV] ทำงานในโหมดออฟไลน์ (เก็บข้อมูลในเครื่องด้วย localStorage)");
    return { offline: true };
  }
  if (db) return { offline: false };   // เชื่อมต่อไว้แล้ว ไม่ต้องทำซ้ำ
  for (let attempt = 1; attempt <= retries; attempt++) {
    const sdk = await loadFirebaseSDK();
    if (sdk) {
      try {
        const { appMod, fsMod } = sdk;
        fsApi = fsMod;
        const app = appMod.getApps && appMod.getApps().length
          ? appMod.getApp()
          : appMod.initializeApp(firebaseConfig);
        db = fsApi.getFirestore(app);
        console.info("[DLTV] เชื่อมต่อ Firebase สำเร็จ (ครั้งที่ " + attempt + ", แหล่ง " + sdk.source + ")");
        return { offline: false };
      } catch (err) {
        lastFbError = err;
        console.warn("[DLTV] เริ่มต้น Firebase ไม่สำเร็จ (ครั้งที่ " + attempt + "):", err);
      }
    }
    if (attempt < retries) await new Promise(r => setTimeout(r, 800 * attempt));
  }
  console.error("[DLTV] เชื่อมต่อ Firebase ไม่สำเร็จ:", lastFbError);
  return { offline: true, error: lastFbError };
}

// บันทึกข้อมูลหนึ่งรายการ (สร้างใหม่)
async function saveSubmission(payload) {
  const record = { ...payload, submittedAt: new Date().toISOString() };

  if (OFFLINE_MODE || !db) {
    record.id = "offline_" + Date.now() + "_" + Math.random().toString(36).slice(2, 7);
    offlineStore.push(record);
    saveLocal();
    return { ok: true, id: record.id, offline: true };
  }
  try {
    const ref = await fsApi.addDoc(
      fsApi.collection(db, COLLECTION),
      { ...record, submittedAt: fsApi.serverTimestamp() }
    );
    return { ok: true, id: ref.id, offline: false };
  } catch (err) {
    // เขียนขึ้นคลาวด์ไม่สำเร็จ (เช่น สิทธิ์ Firestore ยังไม่เปิด) → สำรองลงเครื่องอัตโนมัติ
    console.warn("[DLTV] บันทึกขึ้นคลาวด์ไม่สำเร็จ จึงสำรองลงเครื่องแทน:", err);
    record.id = "offline_" + Date.now() + "_" + Math.random().toString(36).slice(2, 7);
    record.pendingSync = true;            // ทำเครื่องหมายว่ายังไม่ได้ขึ้นคลาวด์
    offlineStore.push(record);
    saveLocal();
    return { ok: true, id: record.id, offline: true, fellBack: true, error: err.message };
  }
}

// แก้ไขข้อมูลรายการเดิม
async function updateSubmission(id, payload) {
  const isLocalId = typeof id === "string" && id.startsWith("offline_");
  if (OFFLINE_MODE || !db || isLocalId) {
    const idx = offlineStore.findIndex(r => r.id === id);
    if (idx === -1) return { ok: false, error: "ไม่พบรายการที่จะแก้ไข" };
    offlineStore[idx] = {
      ...offlineStore[idx],
      ...payload,
      id,
      updatedAt: new Date().toISOString()
    };
    saveLocal();
    return { ok: true, id, offline: true };
  }
  try {
    await fsApi.updateDoc(
      fsApi.doc(db, COLLECTION, id),
      { ...payload, updatedAt: fsApi.serverTimestamp() }
    );
    return { ok: true, id, offline: false };
  } catch (err) {
    console.error("[DLTV] แก้ไขข้อมูลไม่สำเร็จ:", err);
    return { ok: false, error: err.message };
  }
}

// ลบข้อมูลรายการ
async function deleteSubmission(id) {
  const isLocalId = typeof id === "string" && id.startsWith("offline_");
  if (OFFLINE_MODE || !db || isLocalId) {
    const before = offlineStore.length;
    offlineStore = offlineStore.filter(r => r.id !== id);
    saveLocal();
    return { ok: offlineStore.length < before, offline: true };
  }
  try {
    await fsApi.deleteDoc(fsApi.doc(db, COLLECTION, id));
    return { ok: true, offline: false };
  } catch (err) {
    console.error("[DLTV] ลบข้อมูลไม่สำเร็จ:", err);
    return { ok: false, error: err.message };
  }
}

// ดึงรายการที่บันทึกไว้ (กรองตาม formId ได้)
async function listSubmissions(formId = null) {
  if (OFFLINE_MODE || !db) {
    return offlineStore
      .filter(r => !formId || r.formId === formId)
      .map(r => JSON.parse(JSON.stringify(r)));
  }
  // โหมดออนไลน์: ดึงจากคลาวด์ แล้วรวมกับรายการที่สำรองไว้ในเครื่อง (เผื่อบางรายการบันทึกขึ้นคลาวด์ไม่ได้)
  let cloud = [];
  try {
    let q = fsApi.collection(db, COLLECTION);
    if (formId) q = fsApi.query(q, fsApi.where("formId", "==", formId));
    const snap = await fsApi.getDocs(q);
    cloud = snap.docs.map(d => {
      const data = d.data();
      // แปลง Firestore Timestamp → ข้อความ ISO เพื่อให้เรียงลำดับ/แสดงวันที่ได้ถูกต้อง
      if (data.submittedAt && typeof data.submittedAt.toDate === "function") data.submittedAt = data.submittedAt.toDate().toISOString();
      if (data.updatedAt && typeof data.updatedAt.toDate === "function") data.updatedAt = data.updatedAt.toDate().toISOString();
      return { id: d.id, ...data };
    });
  } catch (err) {
    console.error("[DLTV] ดึงข้อมูลจากคลาวด์ไม่สำเร็จ:", err);
  }
  const local = offlineStore
    .filter(r => !formId || r.formId === formId)
    .map(r => JSON.parse(JSON.stringify(r)));
  const seen = new Set(cloud.map(r => r.id));
  return cloud.concat(local.filter(r => !seen.has(r.id)));
}

// ส่งออกข้อมูลออฟไลน์ทั้งหมดเป็นไฟล์ JSON
function exportOffline() {
  const blob = new Blob([JSON.stringify(offlineStore, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "dltv_offline_submissions.json";
  a.click();
  URL.revokeObjectURL(url);
}

// นำเข้าข้อมูลจากไฟล์ JSON (รวมกับข้อมูลเดิม) — ใช้กับโหมดออฟไลน์
function importOffline(records, { replace = false } = {}) {
  if (!Array.isArray(records)) return { ok: false, error: "ไฟล์ไม่ถูกต้อง" };
  if (replace) offlineStore = [];
  let added = 0;
  records.forEach(r => {
    if (!r || typeof r !== "object") return;
    if (!r.id) r.id = "offline_" + Date.now() + "_" + Math.random().toString(36).slice(2, 7);
    if (!offlineStore.some(x => x.id === r.id)) { offlineStore.push(r); added++; }
  });
  saveLocal();
  return { ok: true, added };
}

     <div class="group-chosen">
       <span class="group-chosen__ic">${icon(g.icon)}</span>
       <span>
         <span class="group-chosen__name">${esc(g.name)}</span><br>
         <span class="group-chosen__hint">${esc(g.hint)}</span>
       </span>
     </div>
     <h2 id="group-modal-title" class="group-modal__title">แบบฟอร์มที่ต้องกรอก</h2>
     <p class="group-modal__sub">${needSchool
        ? "แตะที่รายการเพื่อไปยังแบบฟอร์มนั้น แนะนำให้กรอก “ข้อมูลโรงเรียน” ก่อน แล้วจึงกรอกแบบฟอร์มตามลำดับ"
        : "แตะที่รายการเพื่อไปยังแบบฟอร์มที่ต้องกรอก"}</p>
     <div class="journey">${steps}</div>`;

  groupModalCardEl.querySelector("[data-back]").addEventListener("click", () => renderGroupStep1());
  groupModalCardEl.querySelectorAll(".journey-step").forEach(btn => {
    btn.addEventListener("click", () => {
      hideGroupModal();

// ปิดป๊อปอัปด้วยการคลิกพื้นหลัง/กด Esc ได้เฉพาะเมื่อเลือกกลุ่มแล้ว (กันผู้ใช้ใหม่ปิดโดยไม่ตั้งใจ)
groupModalEl.addEventListener("click", e => { if (e.target === groupModalEl && state.group) hideGroupModal(); });
document.addEventListener("keydown", e => { if (e.key === "Escape" && state.group) hideGroupModal(); });

// ---------- เริ่มต้น ----------
async function boot() {
  const fb = await initFirebase();
  state.offline = fb.offline;
  updateConnStatus(fb.error);

  const reg = await loadJSON("forms/index.json");
  state.forms = reg.forms;
  state.commonSchema = await loadJSON("forms/common.json");

  state.group = loadSavedGroup();   // คืนค่ากลุ่มเป้าหมายที่เคยเลือกไว้ (ถ้ามี)
  buildNav();
  showSchoolView();
  openGroupModal();                 // ขึ้นป๊อปอัปเลือก/ยืนยันกลุ่มเป้าหมายทุกครั้งที่เริ่มระบบ
}

// อัปเดตป้ายสถานะการเชื่อมต่อ + ถ้าออฟไลน์ ให้กดเพื่อ "ลองเชื่อมต่อใหม่" ได้
function updateConnStatus(err) {
  if (state.offline) {
    const reason = OFFLINE_MODE ? "" : " · แตะเพื่อลองเชื่อมต่อใหม่";
    statusEl.innerHTML = icon("cloudOff", "status-ic") + "<span>โหมดออฟไลน์ — บันทึกในเครื่อง (localStorage)" + reason + "</span>";
    statusEl.className = "status status--offline has-ic";
    statusEl.title = err ? ("เชื่อมต่อ Firebase ไม่สำเร็จ: " + (err.message || err)) : "";
    statusEl.style.cursor = OFFLINE_MODE ? "default" : "pointer";
    statusEl.onclick = OFFLINE_MODE ? null : reconnect;
  } else {
    statusEl.innerHTML = icon("cloud", "status-ic") + "<span>เชื่อมต่อ Firebase แล้ว</span>";
    statusEl.className = "status status--online has-ic";
    statusEl.title = "";
    statusEl.style.cursor = "default";
    statusEl.onclick = null;
  }
}

// พยายามเชื่อมต่อ Firebase ใหม่ตามคำสั่งผู้ใช้ (ไม่ต้องรีเฟรชหน้า)
let reconnecting = false;
async function reconnect() {
  if (reconnecting || OFFLINE_MODE) return;
  reconnecting = true;
  statusEl.onclick = null;
  statusEl.style.cursor = "progress";
  statusEl.textContent = "กำลังเชื่อมต่อ Firebase…";
  statusEl.className = "status";
  const fb = await initFirebase();
  state.offline = fb.offline;
  updateConnStatus(fb.error);
  reconnecting = false;
  if (!state.offline) {
    showSaveModal({ title: "เชื่อมต่อสำเร็จ", message: "เชื่อมต่อ Firebase แล้ว ระบบจะบันทึกขึ้นคลาวด์ตามปกติ", kind: "ok" });
  } else {
    const detail = (fb.error && (fb.error.message || String(fb.error))) || "ไม่ทราบสาเหตุ";
    showSaveModal({
      title: "ยังเชื่อมต่อไม่ได้",
      message: "ยังเชื่อมต่อ Firebase ไม่สำเร็จ ข้อมูลจะถูกบันทึกลงเครื่องไว้ก่อน\n\nสาเหตุ: " + detail,
      kind: "warn",
      autoClose: 0
    });
  }
}

function setActive(key) {
  document.querySelectorAll(".nav-btn").forEach(x => x.classList.toggle("active", x.dataset.key === key));
}

function buildNav() {
  navEl.innerHTML = "";

  // ปุ่มเลือก/เปลี่ยนกลุ่มเป้าหมาย (เปิดป๊อปอัป)
  const g = getGroup(state.group);
  const tgBtn = document.createElement("button");
  tgBtn.className = "nav-btn nav-btn--target";
  tgBtn.innerHTML = icon("layers", "nav-ic") +
    "<span>" + esc(g ? "กลุ่ม: " + g.name : "เลือกกลุ่มเป้าหมาย") + "</span>";
  tgBtn.addEventListener("click", openGroupModal);
  navEl.append(tgBtn);

  // เมนูข้อมูลโรงเรียน — แสดงเมื่อกลุ่มต้องกรอก (หรือยังไม่เลือกกลุ่ม/โหมดผู้ดูแล)
  if (!g || g.needsSchool !== false) {
    navEl.append(navButton("ข้อมูลโรงเรียน", "school", () => showSchoolView(), "school"));
  }

  navEl.append(navLabel("แบบฟอร์มประเมิน"));
  groupFormMetas(g).forEach(f => {
    navEl.append(navButton(f.code + " · " + f.title, f.id, () => showFormView(f), FORM_ICONS[f.id] || "clipboardList"));
  });

  navEl.append(navLabel("สรุปผล & รายงาน"));
  navEl.append(navButton("แดชบอร์ดสรุปผล", "dashboard", () => showDashboardView(), "barChart"));
  navEl.append(navButton("ข้อมูลที่บันทึก", "records", () => showRecordsView(), "database"));
}

function navLabel(text) {
  const lbl = document.createElement("div");
  lbl.className = "nav-label";
  lbl.textContent = text;
  return lbl;
}
function navButton(label, key, onClick, iconName) {
  const b = document.createElement("button");
  b.className = "nav-btn";
  b.dataset.key = key;
  b.innerHTML = (iconName ? icon(iconName, "nav-ic") : "") + "<span>" + esc(label) + "</span>";
  b.addEventListener("click", () => { setActive(key); onClick(); });
  return b;
}

// ---------- หน้าข้อมูลโรงเรียน ----------
function showSchoolView() {
  setActive("school");
  viewEl.innerHTML = "";
  viewEl.append(header("ข้อมูลพื้นฐานโรงเรียน", "กรอกครั้งเดียว ระบบจะแนบข้อมูลนี้ไปกับทุกแบบฟอร์มที่บันทึก", "school"));
  const container = document.createElement("div");
  viewEl.append(container);

  const ctrl = renderForm(state.commonSchema, container);
  ctrl.setValues(state.school);

  const bar = actionBar();
  bar.append(primaryBtn("บันทึกข้อมูลโรงเรียน", () => {
    const { data } = ctrl.collect();
    if (!data.school_name) { toast("กรุณากรอกชื่อโรงเรียนก่อนบันทึก", "warn"); return; }
    state.school = data;
    upsertSchool(data);
    toast("บันทึกข้อมูลโรงเรียนแล้ว · ค้นหาเลือกใช้ในแบบฟอร์มอื่นได้");
  }, "save"));

// ---------- หน้าฟอร์มประเมิน (กรอกใหม่ / แก้ไข) ----------
async function showFormView(formMeta, editRecord = null) {
  setActive(editRecord ? "records" : formMeta.id);
  viewEl.innerHTML = "";
  viewEl.append(header(formMeta.code + " — " + formMeta.title, "กำลังโหลด...", FORM_ICONS[formMeta.id] || "clipboardList"));
  let schema;
  try {
    schema = await getSchema(formMeta);
  } catch (e) {
    viewEl.append(errorBox("โหลดแบบฟอร์มไม่สำเร็จ: " + e.message));
    return;
  }
  viewEl.innerHTML = "";
  viewEl.append(header(
    (editRecord ? "แก้ไข · " : "") + schema.code + " — " + schema.title,
    schema.audience || "",
    FORM_ICONS[schema.id] || FORM_ICONS[formMeta.id] || "clipboardList"
  ));

  // โหมดแก้ไข: ใช้ข้อมูลโรงเรียนของรายการนั้น
  let schoolForThis = editRecord ? (editRecord.school || {}) : { ...state.school };
  const groupNeedsSchool = (getGroup(state.group) || {}).needsSchool !== false;
  if (!editRecord && SCHOOL_PICK_FORMS.has(schema.id)) {
    // ช่องค้นหา/เลือกโรงเรียนจากที่บันทึกข้อมูลพื้นฐานไว้
    const schools = await getSchoolDirectory();
    viewEl.append(buildSchoolPicker(schools, state.school, (picked) => {
      const s = picked ? { ...picked } : {};
      state.school = s;
      if (state.current) state.current.school = s;
    }));
  } else if (!editRecord) {
    // ฟอร์มที่ไม่ต้องเลือกโรงเรียน (เช่น DLTV-07) — ใช้โรงเรียนที่บันทึกไว้แล้วอัตโนมัติ
    if (groupNeedsSchool && !state.school.school_name) {
      const dir = loadSchoolDir();
      const latest = Object.values(dir).sort((a, b) => String(b._savedAt || "").localeCompare(String(a._savedAt || "")))[0];
      if (latest) { state.school = { ...latest }; schoolForThis = { ...latest }; }
    }
    if (groupNeedsSchool && state.school.school_name) {
      viewEl.append(infoBox(`ใช้ข้อมูลโรงเรียน “${esc(state.school.school_name)}” ที่บันทึกไว้แล้วโดยอัตโนมัติ`));
    } else if (groupNeedsSchool) {
      viewEl.append(infoBox("ยังไม่ได้กรอกข้อมูลโรงเรียน — แนะนำให้กรอกที่เมนู “ข้อมูลโรงเรียน” ก่อน เพื่อแนบไปกับการบันทึก"));
    }
  }
  if (schema.instruction) viewEl.append(infoBox(schema.instruction));

  const container = document.createElement("div");
  viewEl.append(container);
  const ctrl = renderForm(schema, container);
  if (editRecord) ctrl.setValues(editRecord.data);
  state.current = { schema, ctrl, formMeta, editRecord, school: schoolForThis };

  const hasScore = (schema.sections || []).some(s => s.scored);
  const savebar = document.createElement("div");
  savebar.className = "savebar";
  const totalWrap = document.createElement("div");
  totalWrap.className = "savebar__total";
  const btns = document.createElement("div");
  btns.className = "savebar__btns";
  btns.append(ghostBtn("ส่งออก PDF", () => {
    const { data, scores } = ctrl.collect();
    exportPDF({ schema, school: (state.current && state.current.school) || schoolForThis, data, scores });
  }, "fileDown"));
  if (editRecord) {
    btns.append(ghostBtn("ยกเลิก", () => showRecordsView(), "x"));
    btns.append(primaryBtn("บันทึกการแก้ไข", () => submitForm(editRecord.id), "check"));
  } else {
    btns.append(ghostBtn("ล้างฟอร์ม", () => showFormView(formMeta), "rotate"));
    btns.append(primaryBtn("บันทึกข้อมูล", () => submitForm(), "save"));
  }
  savebar.append(totalWrap, btns);
  viewEl.append(savebar);

  let lastScore = null;
  function refreshTotal() {
    if (!hasScore) { totalWrap.innerHTML = ""; return; }
    const t = ctrl.collect().scores.__total || { score: 0, max: 0 };
    const pct = t.max ? Math.round((t.score / t.max) * 100) : 0;
    totalWrap.innerHTML =
      '<span class="savebar__label">คะแนนรวม</span>' +
      '<span class="savebar__num">' + t.score + '</span>' +
      '<span class="savebar__max">/ ' + t.max + '</span>' +
      '<span class="savebar__bar"><i style="width:' + pct + '%"></i></span>';
    if (lastScore !== null && t.score !== lastScore) {
      totalWrap.querySelector(".savebar__num").classList.add("bump");
    }
    lastScore = t.score;
  }
  container.addEventListener("change", refreshTotal);
  refreshTotal();
}

async function submitForm(editId = null) {
  const { schema, ctrl, school } = state.current;
  const { data, scores } = ctrl.collect();

  const missing = [];
  (schema.sections || []).forEach(sec => (sec.fields || []).forEach(f => {
    if (f.required) {
      const v = data[f.id];
      const empty = v == null || v === "" || (typeof v === "object" && "score" in v && !v.score);
      if (empty) missing.push(f.label);
    }
  }));
  if (missing.length) {
    toast("กรุณากรอก: " + missing.slice(0, 3).join(", ") + (missing.length > 3 ? " ..." : ""), "warn");
    return;
  }

  const payload = { formId: schema.id, formCode: schema.code, school, data, scores };
  const res = editId ? await updateSubmission(editId, payload) : await saveSubmission(payload);
  if (res.ok) {
    const title = editId ? "บันทึกการแก้ไขเรียบร้อย" : "บันทึกข้อมูลเรียบร้อย";
    let message = "ระบบบันทึกแบบฟอร์ม " + (schema.code || "") + " เรียบร้อยแล้ว";
    if (res.fellBack) {
      // ขึ้นคลาวด์ไม่ได้ จึงสำรองลงเครื่อง — แจ้งให้ทราบแต่ยังถือว่าบันทึกสำเร็จ
      message = "บันทึกลงเครื่องเรียบร้อยแล้ว (ยังไม่ได้ขึ้นคลาวด์ เนื่องจากสิทธิ์ Firestore ยังไม่เปิด) ข้อมูลจะไม่สูญหาย";
    } else if (res.offline) {
      message = "บันทึกลงเครื่อง (localStorage) เรียบร้อยแล้ว";
    }
    showSaveModal({ title, message, kind: res.fellBack ? "warn" : "ok" });
    if (editId) showRecordsView();
  } else {
    showSaveModal({ title: "บันทึกไม่สำเร็จ", message: res.error || "เกิดข้อผิดพลาด กรุณาลองใหม่อีกครั้ง", kind: "warn", autoClose: 0 });
  }
}

// ============================================================
// ตัวช่วยรวมกลุ่มข้อมูลตามโรงเรียน (ใช้โดยแดชบอร์ด)
// ============================================================
function schoolKey(s) { return (s?.school_code || "") + "|" + (s?.school_name || ""); }

// ============================================================
// คลังโรงเรียน — ค้นหา/เลือกโรงเรียนที่บันทึกข้อมูลพื้นฐานไว้
// ============================================================
const SCHOOL_DIR_KEY = "dltv_school_directory_v1";
// แบบฟอร์มที่ต้องแสดงช่องค้นหา/เลือกโรงเรียน (DLTV-07 ไม่ต้อง — ใช้โรงเรียนที่บันทึกไว้แล้วอัตโนมัติ)
const SCHOOL_PICK_FORMS = new Set(["dltv01", "dltv02", "dltv03", "dltv05"]);

function loadSchoolDir() {
  try { return JSON.parse(localStorage.getItem(SCHOOL_DIR_KEY) || "{}"); } catch (e) { return {}; }
}
function saveSchoolDir(dir) {
  try { localStorage.setItem(SCHOOL_DIR_KEY, JSON.stringify(dir)); } catch (e) { /* ไม่บล็อกการทำงาน */ }
}
// บันทึก/อัปเดตโรงเรียนลงคลัง (เรียกตอนกดบันทึกข้อมูลพื้นฐานโรงเรียน)
function upsertSchool(school) {
  if (!school || !(school.school_name || school.school_code)) return;
  const dir = loadSchoolDir();
  const k = schoolKey(school);
  dir[k] = { ...(dir[k] || {}), ...school, _savedAt: new Date().toISOString() };
  saveSchoolDir(dir);
}
// รวมรายชื่อโรงเรียนจาก (1) คลังที่บันทึกข้อมูลพื้นฐาน (2) ข้อมูลโรงเรียนในรายการที่เคยบันทึก
async function getSchoolDirectory() {
  const map = {};
  try {
    const subs = await listSubmissions();
    subs.forEach(r => {
      if (r.school && (r.school.school_name || r.school.school_code)) {
        const k = schoolKey(r.school);
        map[k] = { ...(map[k] || {}), ...r.school };
      }
    });
  } catch (e) { /* ดึงรายการไม่ได้ ก็ใช้เฉพาะคลัง */ }
  const dir = loadSchoolDir();
  Object.keys(dir).forEach(k => { map[k] = { ...(map[k] || {}), ...dir[k] }; });
  return Object.values(map)
    .filter(s => s.school_name || s.school_code)
    .sort((a, b) => String(a.school_name || "").localeCompare(String(b.school_name || ""), "th"));
}

// สร้างกล่องค้นหา/เลือกโรงเรียน — onPick(schoolObj|null)
function buildSchoolPicker(schools, current, onPick) {
  const box = document.createElement("div");
  box.className = "school-picker";
  box.innerHTML =
    `<div class="school-picker__head">${icon("school", "sp-ic")}<span>เลือกโรงเรียน (ค้นหาจากที่บันทึกข้อมูลพื้นฐานไว้)</span></div>
     <div class="school-picker__search">
       <input type="text" class="input school-picker__input" placeholder="พิมพ์ชื่อโรงเรียน รหัสโรงเรียน หรือสังกัด เพื่อค้นหา..." autocomplete="off">
       <div class="school-picker__list" hidden></div>
     </div>
     <div class="school-picker__selected"></div>`;
  const input = box.querySelector(".school-picker__input");
  const listEl = box.querySelector(".school-picker__list");
  const selEl = box.querySelector(".school-picker__selected");

  function renderSelected(s) {
    if (s && (s.school_name || s.school_code)) {
      selEl.innerHTML =
        `<div class="sp-chip">
           <div class="sp-chip__main">
             <div class="sp-chip__name">${icon("check", "sp-chip__ic")}${esc(s.school_name || "(ไม่ระบุชื่อ)")}</div>
             <div class="sp-chip__meta">
               <span>รหัส: <b>${esc(s.school_code || "-")}</b></span>
               <span>สังกัด: <b>${esc(s.area_office || "-")}</b></span>
               ${s.director_name ? `<span>ผอ.: <b>${esc(s.director_name)}</b></span>` : ""}
             </div>
           </div>
           <button type="button" class="sp-chip__clear">เปลี่ยนโรงเรียน</button>
         </div>`;
      selEl.querySelector(".sp-chip__clear").onclick = () => {
        onPick(null); renderSelected(null); input.value = ""; input.focus();
      };
    } else {
      selEl.innerHTML = schools.length
        ? `<div class="sp-empty">ยังไม่ได้เลือกโรงเรียน — พิมพ์ชื่อโรงเรียนด้านบนเพื่อค้นหา</div>`
        : `<div class="sp-empty sp-empty--warn">ยังไม่มีโรงเรียนในระบบ — กรุณากรอกที่เมนู “ข้อมูลโรงเรียน” แล้วกดบันทึกก่อน จึงจะค้นหาเลือกได้</div>`;
    }
  }

  function filterList(q) {
    q = q.trim().toLowerCase();
    listEl.innerHTML = "";
    if (!q) { listEl.hidden = true; return; }
    const matches = schools.filter(s =>
      String(s.school_name || "").toLowerCase().includes(q) ||
      String(s.school_code || "").toLowerCase().includes(q) ||
      String(s.area_office || "").toLowerCase().includes(q)
    ).slice(0, 12);
    if (!matches.length) {
      listEl.innerHTML = `<div class="sp-opt sp-opt--none">ไม่พบโรงเรียนที่ตรงกับ “${esc(q)}”</div>`;
      listEl.hidden = false; return;
    }
    matches.forEach(s => {
      const opt = document.createElement("button");
      opt.type = "button"; opt.className = "sp-opt";
      opt.innerHTML =
        `<span class="sp-opt__name">${esc(s.school_name || "(ไม่ระบุชื่อ)")}</span>
         <span class="sp-opt__meta">รหัส ${esc(s.school_code || "-")}${s.area_office ? " · " + esc(s.area_office) : ""}</span>`;
      opt.onclick = () => { onPick({ ...s }); renderSelected(s); input.value = s.school_name || ""; listEl.hidden = true; };
      listEl.append(opt);
    });
    listEl.hidden = false;
  }

  input.addEventListener("input", () => filterList(input.value));
  input.addEventListener("focus", () => { if (input.value) filterList(input.value); });
  document.addEventListener("click", e => { if (!box.contains(e.target)) listEl.hidden = true; });

  renderSelected(current && (current.school_name || current.school_code) ? current : null);
  return box;
}

async function showDashboardView() {
  setActive("dashboard");
  viewEl.innerHTML = "";
  viewEl.append(header("แดชบอร์ดสรุปผล", "ภาพรวมคะแนนการประเมินรายโรงเรียน จากทุกแบบฟอร์มที่บันทึก", "barChart"));

  const rows = await listSubmissions();
  if (!rows.length) { viewEl.append(infoBox("ยังไม่มีข้อมูลที่บันทึก")); return; }

  const formTitle = {};
  state.forms.forEach(f => { formTitle[f.id] = f.code; });

  // จัดกลุ่มตามโรงเรียน
  const groups = {};
  rows.forEach(r => {
    const k = schoolKey(r.school);
    (groups[k] = groups[k] || { school: r.school || {}, subs: [] }).subs.push(r);
  });
  const keys = Object.keys(groups);

  // สรุปบนสุด
  const totalSchools = keys.length;
  const totalSubs = rows.length;
  const scored = rows.filter(r => r.scores && r.scores.__total && r.scores.__total.max);
  const avgPct = scored.length
    ? Math.round(scored.reduce((a, r) => a + (r.scores.__total.score / r.scores.__total.max) * 100, 0) / scored.length)
    : 0;

  const stats = document.createElement("div");
  stats.className = "stat-grid";
  stats.append(statCard("โรงเรียนทั้งหมด", totalSchools, "โรงเรียน", "building"));
  stats.append(statCard("จำนวนชุดที่บันทึก", totalSubs, "ชุด", "layers"));
  stats.append(statCard("คะแนนเฉลี่ยรวม", avgPct + "%", "ของคะแนนเต็ม", "percent"));
  viewEl.append(stats);

  const bar = actionBar();
  bar.append(ghostBtn("ส่งออกแดชบอร์ด PDF", () => exportDashboardPDF(groups, keys, formTitle, { totalSchools, totalSubs, avgPct })));
  viewEl.append(bar);

  // การ์ดต่อโรงเรียน
  keys.forEach(k => {
    const g = groups[k];
    const card = document.createElement("section");
    card.className = "school-card";
    const head = document.createElement("div");
    head.className = "school-card__head";
    head.innerHTML = `<h3>${esc(g.school.school_name || "(ไม่ระบุชื่อโรงเรียน)")}</h3>` +
      `<span class="school-card__meta">${esc(g.school.school_code || "")} ${g.school.area_office ? "· " + esc(g.school.area_office) : ""}</span>`;
    card.append(head);

    // เรียงตามรหัสฟอร์ม
    const byForm = {};
    g.subs.forEach(s => { (byForm[s.formId] = byForm[s.formId] || []).push(s); });
    Object.keys(byForm).sort().forEach(fid => {
      const subs = byForm[fid].slice().sort((a, b) => String(b.submittedAt || "").localeCompare(String(a.submittedAt || "")));
      const latest = subs[0];
      const row = document.createElement("div");
      row.className = "dash-row dash-row--clickable";
      const t = latest.scores && latest.scores.__total;
      const pct = t && t.max ? Math.round((t.score / t.max) * 100) : null;
      const lvl = pct == null ? "" : pct >= 80 ? "good" : pct >= 60 ? "ok" : "dev";
      row.innerHTML =
        `<div class="dash-row__name">${esc(formTitle[fid] || fid)} <span class="dash-row__count">${subs.length} ชุด</span></div>` +
        (t && t.max
          ? `<div class="dash-row__score">${t.score} / ${t.max}</div>` +
            `<div class="dash-bar"><i class="lvl-${lvl}" style="width:${pct}%"></i></div>` +
            `<div class="dash-row__pct lvl-${lvl}">${pct}%</div>`
          : `<div class="dash-row__score">—</div><div class="dash-bar"></div><div class="dash-row__pct">ไม่มีคะแนน</div>`) +
        icon("chevronRight", "dash-row__go");
      row.title = "คลิกเพื่อดูพรีวิวรายการล่าสุด";
      row.addEventListener("click", () => showRecordPreview(latest));
      card.append(row);

      // รายละเอียดองค์ประกอบ (ถ้ามีหลาย section ที่ให้คะแนน)
      const comps = latest.scores ? Object.entries(latest.scores).filter(([key, v]) => key !== "__total" && v && v.max) : [];
      const leadNum = s => { const m = String(s || "").match(/^\s*(\d+)/); return m ? parseInt(m[1], 10) : Infinity; };
      comps.sort((a, b) => {
        const na = leadNum(a[1].title), nb = leadNum(b[1].title);
        if (na !== nb) return na - nb;
        return String(a[1].title || "").localeCompare(String(b[1].title || ""), "th");
      });
      if (comps.length > 1) {
        const sub = document.createElement("div");
        sub.className = "dash-sub";
        comps.forEach(([key, v]) => {
          const p = v.max ? Math.round((v.score / v.max) * 100) : 0;
          const l = p >= 80 ? "good" : p >= 60 ? "ok" : "dev";
          sub.innerHTML += `<div class="dash-sub__row"><span>${esc(v.title || key)}</span>` +
            `<span class="dash-sub__bar"><i class="lvl-${l}" style="width:${p}%"></i></span>` +
            `<span class="lvl-${l}">${v.score}/${v.max}${v.level ? " · " + esc(v.level) : ""}</span></div>`;
        });
        card.append(sub);
      }
    });
    viewEl.append(card);
  });
}

function statCard(label, value, unit, iconName) {
  const d = document.createElement("div");
  d.className = "stat-card";
  d.innerHTML = (iconName ? '<div class="stat-card__ic">' + icon(iconName) + '</div>' : "") +
    `<div class="stat-card__val">${value}</div><div class="stat-card__label">${esc(label)}</div><div class="stat-card__unit">${esc(unit)}</div>`;
  return d;
}

// ---------- หน้าข้อมูลที่บันทึก ----------
async function showRecordsView() {
  setActive("records");
  viewEl.innerHTML = "";
  viewEl.append(header("ข้อมูลที่บันทึก", state.offline ? "บันทึกในเครื่อง (localStorage) — แก้ไข/ลบ/ส่งออก PDF ได้" : "แสดงรายการจาก Firebase", "database"));

  const rows = (await listSubmissions()).slice().sort((a, b) => {
    // จัดกลุ่มตามโรงเรียนก่อน แล้วเรียงแบบฟอร์มจากน้อยไปมาก (DLTV-01 → 07) ใหม่สุดอยู่บนเมื่อซ้ำ
    const sa = String(a.school?.school_name || ""), sb = String(b.school?.school_name || "");
    if (sa !== sb) return sa.localeCompare(sb, "th");
    const fa = String(a.formCode || a.formId || ""), fb = String(b.formCode || b.formId || "");
    if (fa !== fb) return fa.localeCompare(fb, "en", { numeric: true });
    return String(b.submittedAt || "").localeCompare(String(a.submittedAt || ""));
  });

  // ตัวกรองตามแบบฟอร์ม
  const filterBar = document.createElement("div");
  filterBar.className = "summary-picker";
  const fsel = document.createElement("select");
  fsel.className = "input select";
  fsel.append(new Option("ทุกแบบฟอร์ม", ""));
  state.forms.forEach(f => fsel.append(new Option(f.code + " — " + f.title, f.id)));
  filterBar.append(labelEl("กรองตามแบบฟอร์ม"), fsel);
  viewEl.append(filterBar);

  const tableMount = document.createElement("div");
  viewEl.append(tableMount);

  function draw() {
    tableMount.innerHTML = "";
    const list = rows.filter(r => !fsel.value || r.formId === fsel.value);
    if (!list.length) { tableMount.append(infoBox("ยังไม่มีข้อมูลที่บันทึก")); return; }
    const table = document.createElement("table");
    table.className = "data-table records";
    table.innerHTML = `<thead><tr>
        <th>แบบฟอร์ม</th><th>โรงเรียน</th><th>ผู้ตอบ</th>
        <th>คะแนนรวม</th><th>เวลาบันทึก</th><th>การจัดการ</th>
      </tr></thead>`;
    const tbody = document.createElement("tbody");
    const schoolTint = {}; let tintSeq = 0;
    list.forEach(r => {
      const respondent = r.data?.teacher_name || r.data?.director_name || r.data?.origin_teacher_name ||
        (r.data?.teacher_names ? r.data.teacher_names.filter(Boolean).join(", ") : "") || "-";
      const t = r.scores?.__total;
      const total = t ? `${t.score}/${t.max}` : "-";
      const pct = t && t.max ? Math.round((t.score / t.max) * 100) : null;
      const lvl = pct == null ? "none" : pct >= 80 ? "good" : pct >= 60 ? "ok" : "dev";
      const when = r.submittedAt ? new Date(r.submittedAt).toLocaleString("th-TH") : "-";
      const sk = schoolKey(r.school || {});
      if (!(sk in schoolTint)) schoolTint[sk] = tintSeq++ % 6;
      const tr = document.createElement("tr");
      tr.className = "sch-" + schoolTint[sk] + " rec-row";
      tr.title = "คลิกเพื่อดูพรีวิวรายละเอียด";
      const scoreCell = `<td class="col-score"><span class="score-pill is-${lvl}">${t ? total : "—"}</span></td>`;
      tr.innerHTML = `<td class="col-form">${esc(r.formCode || r.formId)}</td>
        <td class="col-school">${esc(r.school?.school_name || "-")}</td>
        <td>${esc(respondent)}</td>${scoreCell}<td class="col-when">${esc(when)}</td>`;
      tr.addEventListener("click", () => showRecordPreview(r));
      const actions = document.createElement("td");
      actions.className = "row-actions";
      actions.addEventListener("click", e => e.stopPropagation());
      actions.append(miniBtn("ดู", () => showRecordPreview(r), "mini-btn--view"));
      actions.append(miniBtn("PDF", () => openRecordPDF(r), "mini-btn--pdf"));
      actions.append(miniBtn("แก้ไข", () => editRecord(r), "mini-btn--edit"));
      actions.append(miniBtn("ลบ", () => removeRecord(r), "mini-btn--danger"));
      tr.append(actions);
      tbody.append(tr);
    });
    table.append(tbody);
    tableMount.append(table);
  }
  fsel.addEventListener("change", draw);
  draw();

  // เครื่องมือข้อมูล (ออฟไลน์)
  if (state.offline) {
    const bar = actionBar();
    bar.append(ghostBtn("ดาวน์โหลดข้อมูลทั้งหมด (JSON)", () => exportOffline()));
    const importBtn = ghostBtn("นำเข้าข้อมูล (JSON)", () => fileInput.click());
    const fileInput = document.createElement("input");
    fileInput.type = "file"; fileInput.accept = "application/json"; fileInput.style.display = "none";
    fileInput.addEventListener("change", async () => {
      const file = fileInput.files[0]; if (!file) return;
      try {
        const arr = JSON.parse(await file.text());
        const res = importOffline(Array.isArray(arr) ? arr : [arr]);
        toast(res.ok ? `นำเข้าแล้ว ${res.added} รายการ` : "นำเข้าไม่สำเร็จ", res.ok ? "ok" : "warn");
        showRecordsView();
      } catch (e) { toast("ไฟล์ไม่ถูกต้อง: " + e.message, "warn"); }
    });
    bar.append(importBtn, fileInput);
    viewEl.append(bar);
  }
}

function editRecord(r) {
  const meta = state.forms.find(f => f.id === r.formId) || { id: r.formId, code: r.formCode, title: r.formId, file: "forms/" + r.formId + ".json" };
  showFormView(meta, r);
}

async function removeRecord(r) {
  if (!confirm("ต้องการลบรายการนี้หรือไม่? การลบไม่สามารถย้อนคืนได้")) return;
  const res = await deleteSubmission(r.id);
  toast(res.ok ? "ลบรายการแล้ว" : "ลบไม่สำเร็จ", res.ok ? "ok" : "warn");
  if (res.ok) showRecordsView();
}

async function openRecordPDF(r) {
  const meta = state.forms.find(f => f.id === r.formId);
  let schema = null;
  try { if (meta) schema = await getSchema(meta); } catch (e) { /* fallback below */ }
  if (schema) {
    exportPDF({ schema, school: r.school || {}, data: r.data || {}, scores: r.scores || {} });
  } else {
    toast("ไม่พบโครงสร้างแบบฟอร์มสำหรับสร้าง PDF", "warn");
  }
}

// พรีวิวสรุปรายละเอียดของรายการที่บันทึก (เปิดเป็นป๊อปอัป)

  const meta = state.forms.find(f => f.id === r.formId);

  try { if (meta) schema = await getSchema(meta); } catch (e) { /* จัดการด้านล่าง */ }

  const { body } = buildRecordBody(schema, data, scores);
  const respondent = data.teacher_name || data.director_name || data.origin_teacher_name ||
    (data.teacher_names ? data.teacher_names.filter(Boolean).join(", ") : "") || "-";
  const when = r.submittedAt ? new Date(r.submittedAt).toLocaleString("th-TH") : "-";
  const t = scores.__total;
  const totalLine = t && t.max
    ? `คะแนนรวมทั้งสิ้น ${t.score} / ${t.max} คะแนน (${Math.round((t.score / t.max) * 100)}%)`

  overlay.className = "rv-modal";
  overlay.innerHTML =
    `<div class="rv-modal__card" role="dialog" aria-modal="true">
       <div class="rv-modal__head">
         <div>
           <h3>${esc(schema.code)} — ${esc(schema.title)}</h3>
           <p>${esc(school.school_name || "(ไม่ระบุชื่อโรงเรียน)")}</p>
         </div>
         <button type="button" class="rv-modal__x" aria-label="ปิด">${icon("x")}</button>
       </div>
       <div class="rv-body">
         <div class="rv-meta">
           <span>รหัสโรงเรียน: <b>${esc(school.school_code || "-")}</b></span>
           <span>สังกัด: <b>${esc(school.area_office || "-")}</b></span>
           <span>ผู้ตอบ: <b>${esc(respondent)}</b></span>
           <span>เวลาบันทึก: <b>${esc(when)}</b></span>
         </div>
         <div class="rv-total">${esc(totalLine)}</div>
         ${body}
       </div>
       <div class="rv-foot"></div>
     </div>`;

  const foot = overlay.querySelector(".rv-foot");
  const close = () => { overlay.classList.remove("show"); setTimeout(() => overlay.remove(), 220); };

// ส่งออก PDF (ใช้การพิมพ์ของเบราว์เซอร์ — รองรับฟอนต์ไทยสมบูรณ์)
// ============================================================
function printDoc(title, bodyHTML) {
  const win = window.open("", "_blank");
  if (!win) { toast("เบราว์เซอร์บล็อกหน้าต่างใหม่ — โปรดอนุญาต popup", "warn"); return; }
  win.document.write(`<!DOCTYPE html><html lang="th"><head><meta charset="UTF-8">
    <title>${esc(title)}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>${PRINT_CSS}</style></head><body>${bodyHTML}
    <script>window.onload=function(){setTimeout(function(){window.print();},350);}<\/script>
    </body></html>`);
  win.document.close();
}

function printHeader(formCode, title, school, extra = "") {
  return `<div class="p-head">
    <div class="p-foundation">${esc(FOUNDATION)}</div>
    <div class="p-title">${esc(formCode)} — ${esc(title)}</div>
    <table class="p-school"><tbody>
      <tr><td>โรงเรียน</td><td>${esc(school.school_name || "-")}</td>
          <td>รหัส</td><td>${esc(school.school_code || "-")}</td></tr>
      <tr><td>สังกัด</td><td colspan="3">${esc(school.area_office || "-")}</td></tr>
      ${extra}
    </tbody></table>
  </div>`;
}

function levelBadge(score) {
  if (score == null || score === "") return "—";
  return String(score);
}

// สร้างเนื้อหารายละเอียดรายการ (ใช้ร่วมกันทั้ง PDF และหน้าพรีวิว)
function buildRecordBody(schema, data, scores) {
  const parts = [];
  (schema.sections || []).forEach(sec => {
    parts.push(`<h3 class="p-section">${esc(sec.title || "")}</h3>`);
    if (sec.scored) {
      const sc = scores[sec.id] || {};
      let rows = "";
      (sec.fields || []).forEach(f => {
        if (f.type === "heading") { rows += `<tr class="p-sub"><td colspan="2">${esc(f.label)}</td></tr>`; return; }
        if (f.type !== "rating") return;
        const v = data[f.id] || {};
        const sug = v.suggestion ? `<div class="p-sug">ข้อเสนอแนะ: ${esc(v.suggestion)}</div>` : "";
        rows += `<tr><td>${esc(f.label)}${sug}</td><td class="p-num">${levelBadge(v.score)}</td></tr>`;
      });
      parts.push(`<table class="p-table"><thead><tr><th>รายการประเมิน</th><th class="p-num">ระดับ</th></tr></thead><tbody>${rows}</tbody></table>`);
      parts.push(`<div class="p-subtotal">รวม ${sc.score ?? 0} / ${sc.max ?? sec.maxScore} คะแนน${sc.level ? " · ระดับ " + esc(sc.level) : ""}</div>`);
    } else if (sec.layout === "readiness") {
      let rows = "";
      (sec.fields || []).forEach(f => {
        if (f.type === "heading") { rows += `<tr class="p-sub"><td colspan="2">${esc(f.label)}</td></tr>`; return; }
        if (f.type !== "level") return;
        rows += `<tr><td>${esc(f.label)}</td><td class="p-num">${esc(data[f.id] || "—")}</td></tr>`;
      });
      parts.push(`<table class="p-table"><tbody>${rows}</tbody></table>`);
    } else {
      let rows = "";
      (sec.fields || []).forEach(f => {
        if (f.type === "heading" || f.type === "note") return;
        const valHTML = f.type === "table" ? renderTableValue(f, data[f.id]) : esc(fmtValue(f, data[f.id]));
        rows += `<tr><td class="p-label">${esc(f.label)}</td><td>${valHTML}</td></tr>`;
      });
      parts.push(`<table class="p-table p-kv"><tbody>${rows}</tbody></table>`);
    }
  });
  const totalHTML = scores.__total
    ? `<div class="p-total">คะแนนรวมทั้งสิ้น ${scores.__total.score} / ${scores.__total.max} คะแนน</div>` : "";
  return { body: parts.join(""), totalHTML };
}

// แปลงข้อมูลฟิลด์แบบตาราง (เช่น จำนวนนักเรียน/อุปกรณ์รายชั้น) ให้เป็นตารางย่อยที่อ่านได้
function renderTableValue(f, v) {
  if (!v || typeof v !== "object") return "-";
  const cols = f.columns || [];
  const hasVal = cell => {
    if (cell == null || cell === "") return false;
    if (typeof cell === "object") return Object.values(cell).some(x => x != null && x !== "");
    return true;
  };
  const rowKeys = (f.rows && f.rows.length ? f.rows : Object.keys(v)).filter(rk => hasVal(v[rk]));
  if (!rowKeys.length) return "<span class=\"p-muted\">— ไม่ได้กรอก —</span>";
  if (cols.length > 1) {
    const head = "<th></th>" + cols.map(c => `<th class="p-num">${esc(c.label || c.id)}</th>`).join("");
    const body = rowKeys.map(rk => {
      const cell = v[rk] || {};
      const tds = cols.map(c => {
        const cv = cell[c.id];
        return `<td class="p-num">${cv != null && cv !== "" ? esc(cv) : "-"}</td>`;
      }).join("");
      return `<tr><td>${esc(rk)}</td>${tds}</tr>`;
    }).join("");
    return `<table class="p-nested"><thead><tr>${head}</tr></thead><tbody>${body}</tbody></table>`;
  }
  // ตารางคอลัมน์เดียว → แสดงเป็นรายการสั้น
  const col = cols[0];
  return rowKeys.map(rk => {
    const cell = v[rk];
    const cv = (cell && typeof cell === "object") ? (col ? cell[col.id] : Object.values(cell).join("/")) : cell;
    return `${esc(rk)}: <b>${esc(cv ?? "-")}</b>`;
  }).join(" · ");
}

function exportPDF({ schema, school, data, scores }) {
  const { body, totalHTML } = buildRecordBody(schema, data, scores);
  printDoc(schema.code + " " + (school.school_name || ""),
    printHeader(schema.code, schema.title, school) + body + totalHTML + signBlock());
}

function exportDashboardPDF(groups, keys, formTitle, stat) {
  let body = `<div class="p-head"><div class="p-foundation">${esc(FOUNDATION)}</div>
    <div class="p-title">แดชบอร์ดสรุปผลการประเมินคุณภาพ DLTV รายโรงเรียน</div></div>`;
  body += `<div class="p-total">โรงเรียน ${stat.totalSchools} แห่ง · บันทึก ${stat.totalSubs} ชุด · คะแนนเฉลี่ยรวม ${stat.avgPct}%</div>`;
  keys.forEach(k => {
    const g = groups[k];
    body += `<h3 class="p-section">${esc(g.school.school_name || "(ไม่ระบุชื่อ)")} <small>${esc(g.school.school_code || "")}</small></h3>`;
    const byForm = {};
    g.subs.forEach(s => { (byForm[s.formId] = byForm[s.formId] || []).push(s); });
    let rows = "";
    Object.keys(byForm).sort().forEach(fid => {
      const subs = byForm[fid].slice().sort((a, b) => String(b.submittedAt || "").localeCompare(String(a.submittedAt || "")));
      const t = subs[0].scores && subs[0].scores.__total;
      const cell = t && t.max ? `${t.score} / ${t.max} (${Math.round((t.score / t.max) * 100)}%)` : "—";
      rows += `<tr><td>${esc(formTitle[fid] || fid)}</td><td class="p-num">${subs.length}</td><td class="p-num">${cell}</td></tr>`;
    });
    body += `<table class="p-table"><thead><tr><th>แบบฟอร์ม</th><th class="p-num">จำนวนชุด</th><th class="p-num">คะแนนรวม (ล่าสุด)</th></tr></thead><tbody>${rows}</tbody></table>`;
  });
  printDoc("แดชบอร์ดสรุปผล DLTV", body);
}

// ---------- helpers ----------
function fmtValue(f, v) {
  if (v == null || v === "") return "-";
  if (Array.isArray(v)) return v.join(", ") || "-";
  if (typeof v === "object") {
    if ("score" in v) return v.score == null ? "-" : String(v.score);
    // ฟิลด์ inline (เช่น ปี/เดือน) — ใช้ป้าย prefix/suffix ของ parts ถ้ามี
    const partMap = {};
    (f && f.parts ? f.parts : []).forEach(p => { partMap[p.id] = p; });
    return Object.entries(v).map(([k, val]) => {
      if (val == null || val === "") return "";
      if (typeof val === "object") {
        const inner = Object.entries(val).filter(([, x]) => x != null && x !== "").map(([ck, cv]) => `${ck}: ${cv}`).join(", ");
        return inner ? `${k} (${inner})` : "";
      }
      const p = partMap[k];
      if (p) return `${p.prefix ? p.prefix + " " : ""}${val}${p.suffix ? " " + p.suffix : ""}`;
      return `${k}: ${val}`;
    }).filter(Boolean).join(" · ") || "-";
  }
  return String(v);
}
function esc(s) {
  return String(s ?? "").replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}
function el2(tag, cls, text) { const n = document.createElement(tag); if (cls) n.className = cls; if (text != null) n.textContent = text; return n; }
function labelEl(text) { return el2("label", "field-label", text); }
function wrapTable(t) { const d = document.createElement("div"); d.className = "table-wrap table-wrap--eval"; d.append(t); return d; }
function header(title, sub, iconName) { const h = document.createElement("div"); h.className = "view-header"; h.innerHTML = `<h2>${iconName ? icon(iconName, "vh-ic") : ""}<span>${esc(title)}</span></h2>${sub ? `<p>${esc(sub)}</p>` : ""}`; return h; }
function actionBar() { const d = document.createElement("div"); d.className = "action-bar"; return d; }
function primaryBtn(t, fn, iconName) { const b = document.createElement("button"); b.className = "btn btn--primary"; b.innerHTML = (iconName ? icon(iconName, "btn-ic") : "") + "<span>" + esc(t) + "</span>"; b.onclick = fn; return b; }
function ghostBtn(t, fn, iconName) { const b = document.createElement("button"); b.className = "btn btn--ghost"; b.innerHTML = (iconName ? icon(iconName, "btn-ic") : "") + "<span>" + esc(t) + "</span>"; b.onclick = fn; return b; }
function miniBtn(t, fn, extra = "") { const b = document.createElement("button"); b.className = "mini-btn " + extra; b.textContent = t; b.onclick = fn; return b; }
function infoBox(t) { const d = document.createElement("div"); d.className = "callout callout--info"; d.textContent = t; return d; }
function errorBox(t) { const d = document.createElement("div"); d.className = "callout callout--error"; d.textContent = t; return d; }
